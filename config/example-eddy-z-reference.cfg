# Example configuration for eddy_z_reference
#
# This module provides eddy-based Z reference acquisition with:
# - Multi-sample, slope-based detection
# - Hard Z limits and safety checks
# - Future-compatible with strain-based backend
# - Clean interface, no G28 override
#
# Prerequisites:
# - A configured [probe_eddy_current] section
# - The eddy probe must be calibrated via PROBE_EDDY_CURRENT_CALIBRATE

#####################################################################
# Basic Configuration Example
#####################################################################

# First, configure your eddy current probe (required)
[probe_eddy_current my_eddy]
sensor_type: ldc1612
z_offset: 0.5
x_offset: 0
y_offset: 25
# ... other eddy probe settings ...

# Then configure the Z reference acquisition system
[eddy_z_reference my_sensor]
# Link to the eddy probe (name must match probe_eddy_current section name)
eddy_probe: my_eddy

# Sensor backend type: 'eddy' or 'strain' (for future load cell support)
sensor_backend: eddy

#####################################################################
# Safety Limits (CRITICAL - adjust for your machine!)
#####################################################################

# Hard minimum Z position - probe will error if triggered below this
# Set slightly below your expected first layer height
# Default: -2.0
z_min_limit: -2.0

# Hard maximum Z position - prevents moves above this during acquisition
# Set to safe height above your bed
# Default: 10.0
z_max_limit: 10.0

# Safety timeout for acquisition moves (seconds)
# Default: 60.0
safety_timeout: 60.0

# Optional: force limit for strain backend (grams)
# Only used when sensor_backend: strain
#force_limit: 500

#####################################################################
# Slope Detection Parameters
#####################################################################

# Slope threshold for contact detection (Hz/mm)
# Higher values = less sensitive, lower values = more sensitive
# Adjust based on your sensor's frequency response curve
# Default: 50.0
slope_threshold: 50.0

# Minimum samples required for slope calculation
# More samples = more stable detection but slower response
# Default: 3
slope_samples: 3

# Noise tolerance for slope detection (mm)
# Minimum Z movement required between samples for valid slope
# Default: 0.010
noise_tolerance: 0.010

#####################################################################
# Multi-Sample Acquisition Parameters
#####################################################################

# Number of samples to collect for Z reference
# More samples = better accuracy but longer acquisition time
# Default: 5
sample_count: 5

# Sample window duration (seconds)
# Time to average sensor readings at each sample point
# Default: 0.100
sample_window: 0.100

# Maximum allowed variation between samples (mm)
# Acquisition fails if sample range exceeds this
# Default: 0.050
samples_tolerance: 0.050

# Result calculation method: 'average' or 'median'
# Median is more robust to outliers
# Default: median
samples_result: median

#####################################################################
# Probe Movement Parameters (inherited from probe module)
#####################################################################

# Probing speed (mm/s)
speed: 5.0

# Lift speed (mm/s)
lift_speed: 10.0

# Retract distance between samples (mm)
sample_retract_dist: 2.0

# Probe XY offsets (if different from eddy probe)
x_offset: 0
y_offset: 25

# Z offset for probe
z_offset: 0.5

#####################################################################
# Usage Examples (G-Code Commands)
#####################################################################

# Acquire Z reference:
#   ACQUIRE_Z_REFERENCE SENSOR=my_sensor
#
# With custom parameters:
#   ACQUIRE_Z_REFERENCE SENSOR=my_sensor SAMPLES=10 PROBE_SPEED=3
#
# Check system status:
#   Z_REFERENCE_STATUS SENSOR=my_sensor

#####################################################################
# Macro Example: Pre-print Z reference acquisition
#####################################################################

[gcode_macro CALIBRATE_Z_REFERENCE]
description: Acquire Z reference before printing
gcode:
    # Home if not already homed
    {% if not "xyz" in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    
    # Move to center of bed
    G0 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} Z10 F3000
    
    # Acquire Z reference with extra samples for accuracy
    ACQUIRE_Z_REFERENCE SENSOR=my_sensor SAMPLES=10
    
    # Report result
    M117 Z Reference: {printer["eddy_z_reference my_sensor"].last_z_reference}

#####################################################################
# Advanced: Multiple Sensor Configuration
#####################################################################

# You can configure multiple Z reference sensors for different purposes
# Example: one for regular probing, one for high-precision calibration

